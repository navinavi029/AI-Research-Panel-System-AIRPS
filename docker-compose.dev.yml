version: '3.8'

# Development override for docker-compose.yml
# Usage: docker-compose -f docker-compose.yml -f docker-compose.dev.yml up

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
      args:
        - MAVEN_OPTS=-Xmx1024m
    volumes:
      - ./src:/app/src
      - ./pom.xml:/app/pom.xml
      - maven-cache:/root/.m2
      - upload-data:/app/data
    environment:
      SPRING_DEVTOOLS_RESTART_ENABLED: "true"
      SPRING_JPA_SHOW_SQL: "true"
      LOGGING_LEVEL_ROOT: DEBUG
      LOGGING_LEVEL_COM_AIPANELIST: TRACE
      LOGGING_LEVEL_ORG_SPRINGFRAMEWORK_WEB: DEBUG
    command: mvn spring-boot:run -Dspring-boot.run.jvmArguments="-agentlib:jdwp=transport=dt_socket,server=y,suspend=n,address=*:5005"
    ports:
      - "8080:8080"
      - "5005:5005"  # Debug port
    restart: "no"

  postgres:
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: aipanelist_dev
    volumes:
      - postgres-dev-data:/var/lib/postgresql/data

  pgadmin:
    profiles: []  # Always start in dev mode

volumes:
  maven-cache:
    driver: local
  postgres-dev-data:
    driver: local

version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: aipanelist-postgres
    environment:
      POSTGRES_DB: aipanelist
      POSTGRES_USER: aipanelist
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./init-db:/docker-entrypoint-initdb.d
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aipanelist"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - aipanelist-network
    restart: unless-stopped

  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - MAVEN_OPTS=-Xmx1024m
    container_name: aipanelist-app
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # NVIDIA API Configuration
      NVIDIA_API_KEY: ${NVIDIA_API_KEY:?NVIDIA_API_KEY is required}
      NVIDIA_API_ENDPOINT: ${NVIDIA_API_ENDPOINT:-https://integrate.api.nvidia.com/v1}
      NVIDIA_API_MODEL: ${NVIDIA_API_MODEL:-meta/llama-3.3-70b-instruct}
      
      # Database Configuration
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/aipanelist
      SPRING_DATASOURCE_USERNAME: aipanelist
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_JPA_SHOW_SQL: ${SHOW_SQL:-false}
      
      # Server Configuration
      SERVER_PORT: 8080
      
      # File Storage Configuration
      STORAGE_UPLOAD_DIR: /app/data/uploads
      STORAGE_MAX_FILE_SIZE: 52428800
      
      # Processing Configuration
      PROCESSING_CHUNK_SIZE: 100000
      PROCESSING_MAX_RETRIES: 3
      PROCESSING_RETRY_DELAY_MS: 1000
      
      # Async Configuration
      ASYNC_CORE_POOL_SIZE: 10
      ASYNC_MAX_POOL_SIZE: 20
      ASYNC_QUEUE_CAPACITY: 100
      
      # Logging Configuration
      LOGGING_LEVEL_ROOT: ${LOG_LEVEL_ROOT:-INFO}
      LOGGING_LEVEL_COM_AIPANELIST: ${LOG_LEVEL_APP:-DEBUG}
      
      # JVM Configuration
      JAVA_OPTS: ${JAVA_OPTS:--Xms512m -Xmx2048m -XX:+UseG1GC}
    volumes:
      - upload-data:/app/data
    ports:
      - "${SERVER_PORT:-8080}:8080"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - aipanelist-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '1'
          memory: 512M

  # PgAdmin for database management (optional, for development)
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: aipanelist-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@aipanelist.local}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    volumes:
      - pgadmin-data:/var/lib/pgadmin
    ports:
      - "${PGADMIN_PORT:-5050}:80"
    networks:
      - aipanelist-network
    restart: unless-stopped
    profiles:
      - dev
      - debug

volumes:
  postgres-data:
    driver: local
  upload-data:
    driver: local
  pgadmin-data:
    driver: local

networks:
  aipanelist-network:
    driver: bridge

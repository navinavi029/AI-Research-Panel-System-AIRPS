# Server Configuration
server.port=${SERVER_PORT:8080}

# Database Configuration
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/aipanelist}
spring.datasource.username=${DATABASE_USERNAME:postgres}
spring.datasource.password=${DATABASE_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# File Upload Configuration
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# File Storage Configuration
app.storage.upload-dir=${UPLOAD_DIR:/app/data/uploads}

# NVIDIA API Configuration
nvidia.api.endpoint=${NVIDIA_API_ENDPOINT:https://integrate.api.nvidia.com/v1}
nvidia.api.key=${NVIDIA_API_KEY:}
nvidia.api.model=${NVIDIA_API_MODEL:meta/llama-3.3-70b-instruct}
nvidia.api.rate-limit=${NVIDIA_API_RATE_LIMIT:60}
nvidia.api.max-connections=${NVIDIA_API_MAX_CONNECTIONS:10}

# Async Processing Configuration
spring.task.execution.pool.core-size=10
spring.task.execution.pool.max-size=20
spring.task.execution.pool.queue-capacity=100
spring.task.execution.thread-name-prefix=async-

# Logging Configuration
logging.level.root=INFO
logging.level.com.aipanelist=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# Actuator Configuration (for Docker health checks)
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized
management.health.defaults.enabled=true

# Document Processing Configuration
app.processing.max-document-pages=500
app.processing.max-document-tokens=1000000
app.processing.chunk-size-tokens=100000
app.processing.chunk-overlap-tokens=500
app.processing.chunk-timeout-minutes=5

# Resilience4j Circuit Breaker Configuration
resilience4j.circuitbreaker.instances.nvidia-api.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.nvidia-api.wait-duration-in-open-state=60000
resilience4j.circuitbreaker.instances.nvidia-api.sliding-window-size=10
resilience4j.circuitbreaker.instances.nvidia-api.minimum-number-of-calls=5
